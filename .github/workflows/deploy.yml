---
name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --disable-pip-version-check "ansible-core>=2.17,<2.19"
          ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH credentials
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

      - name: Run playbook
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          MM_DOMAIN: ${{ secrets.MM_DOMAIN }}
          MM_POSTGRES_PASSWORD: ${{ secrets.MM_POSTGRES_PASSWORD }}
          MM_EDGE_ENABLED: ${{ vars.MM_EDGE_ENABLED }}
          ANSIBLE_HOST_KEY_CHECKING: "True"
        run: |
          umask 077
          jq -n \
            --arg domain "$MM_DOMAIN" \
            --arg password "$MM_POSTGRES_PASSWORD" \
            --arg port "${DEPLOY_PORT:-22}" \
            --arg edge "${MM_EDGE_ENABLED:-false}" \
            '{
              mattermost_domain: $domain,
              mattermost_postgres_password: $password,
              ansible_port: ($port | tonumber),
              mattermost_edge_enabled: ($edge == "true")
            }' > "$RUNNER_TEMP/extra_vars.json"
          ansible-playbook site.yml \
            -i "${DEPLOY_HOST}," \
            -u "$DEPLOY_USER" \
            --private-key "$HOME/.ssh/deploy_key" \
            -e "@$RUNNER_TEMP/extra_vars.json"
