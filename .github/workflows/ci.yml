---
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # ansible-lint's pre-commit hook requires a python3.14 interpreter
          python-version: "3.14"

      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: python -m pip install --disable-pip-version-check pre-commit

      - name: Run all checks
        run: pre-commit run --all-files --show-diff-on-failure

  syntax-check:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --disable-pip-version-check "ansible-core>=2.17,<2.19"
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax check
        run: ansible-playbook --syntax-check -i inventories/example/hosts.yml site.yml
