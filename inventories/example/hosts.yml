---
# Example inventory. For local (non-CI) deployments copy this directory to
# inventories/local/ (gitignored) and fill in real values there. Never commit
# real hostnames, credentials, or domains.
all:
  hosts:
    mattermost:
      ansible_host: server.example.com
      ansible_user: root
  vars:
    mattermost_domain: chat.example.com
    # Generate with: openssl rand -hex 32. Keep real values out of version
    # control — use ansible-vault or pass via --extra-vars at run time.
    mattermost_postgres_password: change-me
    # Set to false when another reverse proxy already owns ports 80/443.
    mattermost_edge_enabled: true
